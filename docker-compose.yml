version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: makkssik
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: postgres
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makkssik -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://makkssik:qwerty@db:5432/postgres?sslmode=disable
      - up
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8082:8080"
    environment:
      - CONFIG_PATH=./config/local.yaml
      - STORAGE_PATH=host=db port=5432 user=makkssik password=qwerty dbname=postgres sslmode=disable
    depends_on:
      migrator:
        condition: service_completed_successfully
    command: ["./url-shortener", "-storage=postgres"]